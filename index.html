<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐 - 静静</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", 幼圆, sans-serif;
        }
        body {
            background-color: #ffe6f2;
            overflow: hidden;
        }
        /* 画面1：密码弹窗 */
        #screen1 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url("https://img.icons8.com/color/256/000000/hello-kitty.png") no-repeat center/30% rgba(255, 240, 245, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .password-box {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px #ff99cc;
            text-align: center;
            border: 5px solid #ff66b2;
        }
        .password-box h2 {
            color: #ff66b2;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .password-box input {
            padding: 10px 15px;
            font-size: 18px;
            border: 3px solid #ffb3d9;
            border-radius: 10px;
            margin-bottom: 20px;
            width: 200px;
            outline: none;
        }
        .password-box input:focus {
            border-color: #ff66b2;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            padding: 10px 20px;
            background: #ff66b2;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #ff3399;
            transform: scale(1.05);
        }
        /* 画面2：聊天气泡弹窗 */
        #screen2 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #fff0f5;
            display: none;
            z-index: 999;
        }
        .bubble {
            position: absolute;
            padding: 15px 20px;
            border-radius: 20px 20px 20px 5px;
            background: linear-gradient(120deg, #ffd1dc, #ff99cc);
            color: #333;
            font-size: 16px;
            box-shadow: 0 5px 10px rgba(255, 102, 178, 0.3);
            display: none;
            align-items: center;
            gap: 10px;
            animation: float 3s ease-in-out infinite;
            max-width: 220px;
            /* 防止气泡重叠的层级控制 */
            z-index: 10;
        }
        .bubble img {
            width: 30px;
            height: 30px;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
        /* 画面3：粒子聚焦效果 */
        #screen3 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: none;
            z-index: 998;
        }
        #particleCanvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 画面1：密码弹窗 -->
    <div id="screen1">
        <div class="password-box">
            <h2>我想静静</h2>
            <input type="password" id="passwordInput" placeholder="请输入密码">
            <div class="btn-group">
                <button class="btn" id="confirmBtn">确定</button>
                <button class="btn" id="cancelBtn">取消</button>
            </div>
        </div>
    </div>

    <!-- 画面2：聊天气泡弹窗 -->
    <div id="screen2"></div>

    <!-- 画面3：粒子聚焦效果 -->
    <div id="screen3">
        <canvas id="particleCanvas"></canvas>
    </div>

    <script>
        // 元素获取
        const screen1 = document.getElementById('screen1');
        const screen2 = document.getElementById('screen2');
        const screen3 = document.getElementById('screen3');
        const passwordInput = document.getElementById('passwordInput');
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const particleCanvas = document.getElementById('particleCanvas');
        const ctx = particleCanvas.getContext('2d');

        // 设置画布尺寸
        function resizeCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 画面1：密码验证逻辑（密码改为0322）
        const correctPassword = '0322';
        confirmBtn.addEventListener('click', () => {
            if (passwordInput.value === correctPassword) {
                screen1.style.display = 'none';
                screen2.style.display = 'block';
                createBubbles(); // 生成聊天气泡
            } else {
                alert('密码错误，请重新输入！');
                passwordInput.value = '';
            }
        });
        cancelBtn.addEventListener('click', () => {
            passwordInput.value = '';
        });

        // 画面2：生成30个小文主题聊天气泡（优化分布，彻底避免遮挡）
        function createBubbles() {
            // 30条小文给静静的生日祝福（0322主题+可爱风）
            const bubbleTexts = [
                "小文祝静静0322生日快乐🎂",
                "静静宝贝3月22号超甜😘",
                "愿静静永远像Kitty一样可爱🐱",
                "0322生日快乐～暴富暴美✨",
                "静静的3月生日超有意义💖",
                "小文陪静静过0322生日啦🥳",
                "3.22平安喜乐，万事胜意🎈",
                "解锁静静新一岁的美好🌟",
                "0322生日限定：静静最甜🎊",
                "今天静静是3月最靓的仔👑",
                "吃甜甜的蛋糕，做甜甜的梦🍰",
                "岁岁年年，静静快乐不减🥰",
                "静静，0322生日快乐鸭～",
                "小文给静静0322专属祝福💌",
                "愿所有美好都奔向3月的静静🌈",
                "0322生日快乐加载中🔛",
                "静静的22号超快乐🎉",
                "Kitty陪静静过0322生日🐾",
                "新的一岁，静静温柔又强大💪",
                "小文永远爱0322的静静😜",
                "生日要吃好多好多糖🍬",
                "静静的快乐不打烊✨",
                "3月的小寿星静静超棒👍",
                "愿静静被温柔以待🌷",
                "0322生日快乐，不止今天🎁",
                "小文的小心心给静静💓",
                "静静0322生日超甜超可爱🍓",
                "新岁如愿，日子滚烫🔥",
                "和Kitty一起庆生啦🎀",
                "静静，天天都是好日子☀️"
            ];
            const screen2 = document.getElementById('screen2');
            const bubbleWidth = 220; // 气泡宽度
            const bubbleHeight = 80;  // 气泡高度
            const padding = 20;       // 间距

            // 计算网格行列数（适配不同屏幕）
            const cols = Math.floor((window.innerWidth - padding * 2) / (bubbleWidth + padding));
            const rows = Math.ceil(30 / cols);

            // 生成30个气泡（网格均匀分布，完全无遮挡）
            bubbleTexts.forEach((text, index) => {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.innerHTML = `
                    <img src="https://img.icons8.com/fluency/48/000000/hello-kitty.png" alt="kitty">
                    ${text}
                `;
                screen2.appendChild(bubble);

                // 网格定位（彻底避免遮挡）
                const col = index % cols;
                const row = Math.floor(index / cols);
                const x = padding + col * (bubbleWidth + padding);
                const y = padding + row * (bubbleHeight + padding);
                
                bubble.style.left = `${x}px`;
                bubble.style.top = `${y}px`;

                // 逐个弹出（间隔300ms）
                setTimeout(() => {
                    bubble.style.display = 'flex';
                    // 最后一个气泡弹出后2秒跳转到画面3
                    if (index === 29) {
                        setTimeout(() => {
                            screen2.style.display = 'none';
                            screen3.style.display = 'block';
                            initParticles(); // 初始化粒子效果
                        }, 2000);
                    }
                }, index * 300);
            });
        }

        // 画面3：粒子聚焦合成「静静 happybirthday」
        let particles = [];
        const text1 = "静静"; // 上行文字
        const text2 = "happybirthday"; // 下行文字
        const fontSize1 = 100;
        const fontSize2 = 50;
        const particleCount = 2800; // 粒子数量，效果更饱满

        // 初始化粒子
        function initParticles() {
            particles = [];
            // 绘制文字获取像素点
            ctx.font = `bold ${fontSize1}px Microsoft YaHei`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const text1X = particleCanvas.width / 2;
            const text1Y = particleCanvas.height / 2 - 60;
            const text2X = particleCanvas.width / 2;
            const text2Y = particleCanvas.height / 2 + 60;

            // 先绘制文字到画布（不可见），获取像素数据
            ctx.fillStyle = '#fff';
            ctx.fillText(text1, text1X, text1Y);
            ctx.fillText(text2, text2X, text2Y);
            const imageData = ctx.getImageData(0, 0, particleCanvas.width, particleCanvas.height);
            ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

            // 生成粒子
            for (let i = 0; i < particleCount; i++) {
                // 随机初始位置
                let x = Math.random() * particleCanvas.width;
                let y = Math.random() * particleCanvas.height;
                // 目标位置（文字像素点）
                let targetX = x;
                let targetY = y;

                // 查找文字像素点作为目标
                let found = false;
                while (!found && i < particleCount) {
                    const pixelX = Math.floor(Math.random() * particleCanvas.width);
                    const pixelY = Math.floor(Math.random() * particleCanvas.height);
                    const pixelIndex = (pixelY * particleCanvas.width + pixelX) * 4;
                    if (imageData.data[pixelIndex] > 0) { // 白色像素点
                        targetX = pixelX;
                        targetY = pixelY;
                        found = true;
                    }
                }

                // 粉色系渐变粒子，更贴合生日主题
                particles.push({
                    x, y,
                    targetX, targetY,
                    size: Math.random() * 3 + 1,
                    speed: Math.random() * 2 + 1,
                    color: `rgb(${255}, ${Math.floor(Math.random() * 120) + 135}, ${Math.floor(Math.random() * 180) + 75})`
                });
            }

            // 动画循环
            animateParticles();
        }

        // 粒子动画
        function animateParticles() {
            ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            particles.forEach(particle => {
                // 粒子向目标移动（缓动效果，更丝滑）
                const dx = particle.targetX - particle.x;
                const dy = particle.targetY - particle.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance > 1) {
                    particle.x += dx / distance * particle.speed * 0.8;
                    particle.y += dy / distance * particle.speed * 0.8;
                }

                // 绘制粒子
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fillStyle = particle.color;
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
    </script>
</body>
</html>
